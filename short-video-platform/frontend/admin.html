<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 短视频生成平台</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    
    .admin-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: var(--radius-lg);
      padding: 32px;
      color: white;
      margin-bottom: 24px;
    }
    
    .admin-header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    
    .admin-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 24px;
      text-align: center;
      border: 1px solid var(--border-color);
    }
    
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 4px;
    }
    
    .stat-label {
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .admin-section {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid var(--border-color);
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 600;
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .data-table th,
    .data-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    
    .data-table th {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 13px;
      text-transform: uppercase;
    }
    
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .badge-admin {
      background: #fee2e2;
      color: #dc2626;
    }
    
    .badge-user {
      background: #dbeafe;
      color: #2563eb;
    }
    
    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
    }
    
    .btn-danger {
      background: #dc2626;
      color: white;
    }
    
    .btn-danger:hover {
      background: #b91c1c;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
    
    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 16px;
      border-radius: var(--radius-md);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="23 7 16 12 23 17 23 7"></polygon>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
      </svg>
      短视频生成
    </a>
    
    <ul class="navbar-nav">
      <li><a href="index.html" class="nav-link">首页</a></li>
      <li><a href="videos.html" class="nav-link">视频库</a></li>
      <li><a href="admin.html" class="nav-link active">管理后台</a></li>
      <li><a href="profile.html" class="nav-link">我的</a></li>
    </ul>
  </nav>

  <main class="admin-container">
    <!-- 管理头部 -->
    <div class="admin-header">
      <h1>👑 管理后台</h1>
      <span class="admin-badge">超级管理员</span>
    </div>
    
    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-users">-</div>
        <div class="stat-label">总用户数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-videos">-</div>
        <div class="stat-label">总视频数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-tasks">-</div>
        <div class="stat-label">总任务数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-processing">-</div>
        <div class="stat-label">处理中</div>
      </div>
    </div>
    
    <!-- 用户列表 -->
    <div class="admin-section">
      <div class="section-header">
        <h2 class="section-title">👥 用户列表</h2>
      </div>
      <div id="users-loading" class="loading">加载中...</div>
      <div id="users-content" style="display: none;">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>用户名</th>
              <th>邮箱</th>
              <th>角色</th>
              <th>注册时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
          </tbody>
        </table>
      </div>
    </div>
  </main>
  
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
