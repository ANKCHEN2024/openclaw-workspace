<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频详情 - 短视频生成平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="23 7 16 12 23 17 23 7"></polygon>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
      </svg>
      短视频生成
    </a>
    
    <button class="menu-toggle" aria-label="菜单">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    
    <ul class="navbar-nav">
      <li><a href="index.html" class="nav-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        首页
      </a></li>
      <li><a href="videos.html" class="nav-link active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
        视频库
      </a></li>
      <li><a href="settings.html" class="nav-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        设置
      </a></li>
    </ul>
  </nav>

  <!-- 主内容区 -->
  <main class="container">
    <!-- 未登录提示 -->
    <div id="login-required" class="card" style="display: none; text-align: center; padding: 60px 40px;">
      <div style="font-size: 64px; margin-bottom: 20px;">🔒</div>
      <h2 style="margin-bottom: 12px;">请先登录</h2>
      <p style="color: var(--text-secondary); margin-bottom: 24px;">登录后即可查看内容</p>
      <a href="login.html" class="btn btn-primary btn-lg">立即登录</a>
    </div>
    <div id="main-content">
    <div class="page-header">
      <button id="back-btn" class="btn btn-outline btn-sm mb-2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        返回
      </button>
    </div>

    <!-- 视频播放器 -->
    <div class="video-player-container">
      <video 
        id="video-player" 
        class="video-player" 
        controls 
        playsinline
        poster=""
      >
        您的浏览器不支持视频播放
      </video>
    </div>

    <!-- 视频信息 -->
    <div class="video-detail-info">
      <div>
        <h1 id="video-title" class="video-detail-title">加载中...</h1>
        <div class="video-detail-meta">
          <span>📅 创建时间：<span id="video-created-at">-</span></span>
          <span>⏱️ 时长：<span id="video-duration">-</span></span>
          <span>🎨 风格：<span id="video-style">-</span></span>
        </div>
      </div>
      
      <div class="video-detail-actions">
        <button id="download-btn" class="btn btn-primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          下载视频
        </button>
        <button id="delete-btn" class="btn btn-danger">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
          删除
        </button>
      </div>
    </div>

    <!-- 提示词区域 -->
    <div class="video-detail-section">
      <h2 class="video-detail-section-title">生成提示词</h2>
      <div id="video-prompt" class="prompt-text">
        加载中...
      </div>
    </div>
  </div><!-- /main-content -->
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (!Auth.isLoggedIn()) {
        document.getElementById("login-required").style.display = "block";
        document.getElementById("main-content").style.display = "none";
      }
    });
  </script>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
