<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 短视频生成平台</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
    }
    
    .profile-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: var(--radius-lg);
      padding: 40px;
      color: white;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      border: 4px solid rgba(255,255,255,0.3);
    }
    
    .profile-info h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    
    .profile-info p {
      opacity: 0.9;
      font-size: 15px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 20px;
      text-align: center;
      border: 1px solid var(--border-color);
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 4px;
    }
    
    .stat-label {
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .profile-section {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid var(--border-color);
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    .btn-danger {
      background: #dc2626;
      color: white;
    }
    
    .btn-danger:hover {
      background: #b91c1c;
    }
    
    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="23 7 16 12 23 17 23 7"></polygon>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
      </svg>
      短视频生成
    </a>
    
    <button class="menu-toggle" aria-label="菜单">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    
    <ul class="navbar-nav">
      <li><a href="index.html" class="nav-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        首页
      </a></li>
      <li><a href="videos.html" class="nav-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
        视频库
      </a></li>
      <li><a href="settings.html" class="nav-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        设置
      </a></li>
      <li><a href="profile.html" class="nav-link active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        我的
      </a></li>
    </ul>
  </nav>

  <main class="profile-container">
    <!-- 用户信息卡片 -->
    <div class="profile-header">
      <div class="profile-avatar" id="user-avatar">👤</div>
      <div class="profile-info">
        <h1 id="user-name">加载中...</h1>
        <p id="user-email">...</p>
      </div>
    </div>
    
    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-videos">0</div>
        <div class="stat-label">生成视频</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-tasks">0</div>
        <div class="stat-label">总任务</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-processing">0</div>
        <div class="stat-label">处理中</div>
      </div>
    </div>
    
    <!-- 编辑资料 -->
    <div class="profile-section">
      <h2 class="section-title">编辑资料</h2>
      <form id="profile-form">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">用户名</label>
            <input type="text" id="profile-username" class="form-control" placeholder="用户名">
          </div>
          <div class="form-group">
            <label class="form-label">邮箱</label>
            <input type="email" id="profile-email" class="form-control" placeholder="邮箱">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">保存修改</button>
      </form>
    </div>
    
    <!-- 修改密码 -->
    <div class="profile-section">
      <h2 class="section-title">修改密码</h2>
      <form id="password-form">
        <div class="form-group">
          <label class="form-label">当前密码</label>
          <input type="password" id="current-password" class="form-control" placeholder="当前密码" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">新密码</label>
            <input type="password" id="new-password" class="form-control" placeholder="至少6位" required minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label">确认新密码</label>
            <input type="password" id="confirm-password" class="form-control" placeholder="再次输入" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">修改密码</button>
      </form>
    </div>
    
    <!-- 退出登录 -->
    <div class="profile-section" style="text-align: center;">
      <button id="logout-btn" class="btn btn-danger">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 8px;">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        退出登录
      </button>
    </div>
  </main>
  
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
