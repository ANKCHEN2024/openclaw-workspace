version: '3.8'

services:
  # PostgreSQL 数据库服务
  postgres:
    image: postgres:15-alpine
    container_name: ai-drama-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drama_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-drama_platform}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - ai-drama-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drama_admin} -d ${POSTGRES_DB:-drama_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存/队列服务
  redis:
    image: redis:7-alpine
    container_name: ai-drama-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ai-drama-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO 对象存储服务
  minio:
    image: minio/minio:latest
    container_name: ai-drama-minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_change_this}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - ai-drama-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # MinIO 初始化服务（创建 bucket）
  minio-init:
    image: minio/mc:latest
    container_name: ai-drama-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin_change_this}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-drama-platform}
    networks:
      - ai-drama-network
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set ai-drama-minio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin_change_this};
      /usr/bin/mc mb --ignore-existing ai-drama-minio/${MINIO_BUCKET_NAME:-drama-platform};
      /usr/bin/mc policy set public ai-drama-minio/${MINIO_BUCKET_NAME:-drama-platform};
      exit 0;
      "

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-drama-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin_change_this}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-drama-platform}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      TONGYI_API_KEY: ${TONGYI_API_KEY}
      TONGYI_WANXIANG_API_KEY: ${TONGYI_WANXIANG_API_KEY}
      KELING_API_KEY: ${KELING_API_KEY}
      JIMENG_API_KEY: ${JIMENG_API_KEY}
      ALIYUN_VOICE_API_KEY: ${ALIYUN_VOICE_API_KEY}
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET}
      NETEASE_MUSIC_API_KEY: ${NETEASE_MUSIC_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-104857600}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      FRONTEND_URL: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    networks:
      - ai-drama-network
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api/v1}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost/ws}
    container_name: ai-drama-frontend
    depends_on:
      - backend
    networks:
      - ai-drama-network
    restart: unless-stopped

  # Nginx 反向代理服务
  nginx:
    image: nginx:alpine
    container_name: ai-drama-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - ai-drama-network
    restart: unless-stopped

# 数据卷定义
volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_logs:
  backend_uploads:

# 网络定义
networks:
  ai-drama-network:
    driver: bridge
